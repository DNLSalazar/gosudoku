<html>
  <head>
    <title>Sudoku board</title>
  </head>

  <style>
    #board {
      width: 500px;
      min-height: 300px;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
    }
    #board > input {
      max-width: 1rem;
      width: 1rem;
    }
    #players {
      width: 100%;
      display: flex;
      flex-direction: row;
      gap: 20px;
      justify-content: center;
      align-items: center;
    }
    #players > .div {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      height: auto;
      width: auto;
    }
    #players .playerMinBoard {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
      gap: 3px;
    }
    #players span {
      width: 8px;
      height: 8px;
    }
  </style>

  <body>
    <center>
      <h3 id="title">Sudoku</h3>
      <div id="board"></div>
      <div id="players"></div>
    </center>

    <script>
      const url = "ws://" + window.location.host + "/ws";
      const ws = new WebSocket(url);

      const mainBoard = document.getElementById("board");
      const gameTitle = document.getElementById("title");
      const playersBoards = document.getElementById("players");

      const ERROR_COLOR = "#FF0000";
      const CORRECT_COLOR = "#00FF00";
      const GRAY_COLOR = "#C7C7C7";
      let currentPlayerId = "";
      let currentPlayerName = "";
      let gameEnded = false;

      function buildBoard(board) {
        for (let i = 0; i < board.length; i++) {
          const row = board[i];
          for (let j = 0; j < row.length; j++) {
            const cel = row[j];
            if (!cel) continue;
            const id = `${cel.coor.x}-${cel.coor.y}`;
            const elementOnBoard = document.getElementById(id);
            if (!elementOnBoard) {
              const element = document.createElement("input");

              element.maxLength = 1;
              element.id = id;
              element.disabled = cel.static;
              element.value = cel.value || "";
              element.style.borderColor = cel.hasError ? ERROR_COLOR : "";
              element.onkeyup = onKey;

              mainBoard.appendChild(element);
              continue;
            }

            elementOnBoard.value = cel.value || "";
            elementOnBoard.style.borderColor = cel.hasError ? ERROR_COLOR : "";
          }
        }
      }

      function buildPlayersBoards(playersData) {
        for (let i = 0; i < playersData.length; i++) {
          const playerData = playersData[i];
          const playerName = playerData.playerName;
          const board = playerData.board;
          const boardId = `board_player_${playerData.playerName}`;
          let boardElement = document.getElementById(boardId);

          if (!boardElement) {
            const container = document.createElement("div");
            const title = document.createElement("p");
            title.innerHTML = playerData.playerName;
            if (playerData.playerName === currentPlayerName) {
              title.style.border = "1px solid blue";
            }
            container.appendChild(title);

            const element = document.createElement("div");
            element.id = boardId;
            element.className = "playerMinBoard";
            boardElement = element;
            container.appendChild(boardElement);
            playersBoards.appendChild(container);
          }

          for (let j = 0; j < board.length; j++) {
            const row = board[j];
            for (let k = 0; k < row.length; k++) {
              const cell = row[k];
              if (!cell) continue;

              const id = `dumb_${boardId}.${cell.coor.x}-${cell.coor.y}`;
              let elementOnBoard = document.getElementById(id);
              if (!elementOnBoard) {
                const element = document.createElement("span");
                element.id = id;
                elementOnBoard = element;
                boardElement.appendChild(elementOnBoard);
              }
              elementOnBoard.style.backgroundColor = cell.hasError ? ERROR_COLOR : cell.hasValue ? CORRECT_COLOR : GRAY_COLOR;
            }
          }
        }
      }

      function disableBoard() {
        const inputs = board.childNodes;
        for (let i = 0; i < inputs.length; i++) {
          const element = inputs[i];
          if (element.tagName === "INPUT") {
            element.disabled = true
          }
        }
      }

      function handleEndGame(info) {
        gameTitle.innerHTML = `${info.winnerName} has won!!`;
        buildPlayersBoards(info.playerData);
        disableBoard()
      }

      fetch(`${window.location.protocol}//${window.location.host}/board`).then(async res => {
        console.log("Getting data from server...");
        const data = await res.json();
        currentPlayerId = data.data.playerId;
        currentPlayerName = data.data.playerName;
        buildBoard(data.data.board);
      }).catch(error => {
        console.error("Error getting board", error);
      });

      ws.onmessage = function (msg) {
        try {
          const data = JSON.parse(msg.data);

          const type = data.type;
          switch(type) {
            case "board": {
              buildBoard(data.data);
              break;
            }
            case "players": {
              buildPlayersBoards(data.data);
              break;
            }
            case "GameEnded": {
              handleEndGame(data.data);
              break;
            }
            case "Error": {
              console.error("Error from server", data.data);
              break;
            }
            default: {
              console.error("Error getting message type", data);
              break;
            }
          }
        } catch(error) {
          console.error("Error handling message", msg, error);
        }
      };

      function fromStringToCoors(val) {
        const numbers = val.split("-");
        if (numbers.length !== 2) {
          console.error("Error getting coors from string", val, numbers, number.length);
          throw new Error("Error getting coors from string");
        }

        return {
          x: Number(numbers[0]),
          y: Number(numbers[1])
        };
      }

      function onKey(e) {
        if (gameEnded) {
          e.target.value = ""
        }
        if (!Number(e.target.value)) {
          e.target.value = "";
          return
        }
        if (e.keyCode === 13 && e.target.value != "") {
          coors = fromStringToCoors(e.target.id);
          const data = {
            coors,
            value: Number(e.target.value),
            playerId: currentPlayerId
          };
          ws.send(JSON.stringify(data));
        }
      };
    </script>
  </body>
</html>
